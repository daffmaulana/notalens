services:
  - type: web
    name: notalens-ai
    runtime: python
    rootDir: ai
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # you'll enter this manually in Render dashboard
    autoDeploy: true
